# ==============================================================================
# 🚀 Modbus naar MQTT Bridge Configuratie
# ==============================================================================

# MQTT Broker Instellingen
mqtt:
  broker: "192.168.50.106"
  port: 1883
  username: "mqqt"
  password: "mqqt"
  topic_prefix: "usr_n580_bridge"      # Hoofdtopic voor de gepubliceerde waarden
  discovery_prefix: "homeassistant"   # Home Assistant Autodiscovery topic prefix
  client_id: "modbus_mqtt_bridge"
  keepalive: 60

# Modbus Verbinding Instellingen (USR-N580 Gateway)
modbus:
  host: "192.168.50.96"
  port: 41
  timeout: 3
  poll_interval: 15                   # Polling interval in seconden

# Definitie van alle Modbus-registers en hun weergave in Home Assistant
sensors:
  # ====================================================================
  # 🟢 1. WARMTEPOMP (Slave ID 1)
  # ====================================================================
  - name: "Warmtepomp AAN/UIT status"
    unique_id: "warmtepomp_power_status"
    slave: 1
    register_type: "holding"          # 'holding' of 'input'
    address: 0
    data_type: "int16"                # int16, uint16, int32, uint32
    scale: 1.0
    precision: 0
    unit_of_measurement: ""
    device_class: ""
    state_class: "measurement"
    writeable: true
    entity_type: "switch"

  - name: "Warmtepomp Modus"
    unique_id: "warmtepomp_mode_status"
    slave: 1
    register_type: "holding"
    address: 1
    data_type: "int16"
    scale: 1.0
    precision: 0
    unit_of_measurement: ""
    device_class: ""
    state_class: "measurement"

  - name: "Warmtepomp Doeltemperatuur"
    unique_id: "warmtepomp_target_temp_modbus"
    slave: 1
    register_type: "holding"
    address: 11
    data_type: "int16"
    scale: 1.0
    precision: 0
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    writeable: true
    entity_type: "number"
    min: 15
    max: 45
    step: 1

  - name: "Warmtepomp Temp Water In"
    unique_id: "warmtepomp_temp_in_modbus"
    slave: 1
    register_type: "holding"
    address: 104
    data_type: "int16"
    scale: 1.0
    precision: 0
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"

  - name: "Warmtepomp Temp Buiten"
    unique_id: "warmtepomp_temp_buiten_modbus"
    slave: 1
    register_type: "holding"
    address: 107
    data_type: "int16"
    scale: 1.0
    precision: 0
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"

  # ====================================================================
  # 🔵 2. SINOTIMER DDS6619 (Slave ID 2)
  # ====================================================================
  - name: "Sinotimer Spanning"
    unique_id: "sinotimer_spanning"
    slave: 2
    register_type: "input"
    address: 0
    data_type: "int16"
    scale: 0.1
    precision: 1
    unit_of_measurement: "V"
    device_class: "voltage"
    state_class: "measurement"

  - name: "Sinotimer Stroom"
    unique_id: "sinotimer_stroom"
    slave: 2
    register_type: "input"
    address: 3
    data_type: "int16"
    scale: 0.01
    precision: 2
    unit_of_measurement: "A"
    device_class: "current"
    state_class: "measurement"

  - name: "Sinotimer Actief Vermogen"
    unique_id: "sinotimer_vermogen"
    slave: 2
    register_type: "input"
    address: 8
    data_type: "int16"
    scale: 1.0
    precision: 0
    unit_of_measurement: "W"
    device_class: "power"
    state_class: "measurement"

  # ====================================================================
  # 🟡 3. KWS-303 METERS (Slave ID 3, 4, 5)
  # ====================================================================
  - name: "KWS Meter 1 Spanning"
    unique_id: "kws_meter_1_spanning"
    slave: 3
    register_type: "holding"
    address: 14
    data_type: "int16"
    scale: 0.01
    precision: 1
    unit_of_measurement: "V"
    device_class: "voltage"
    state_class: "measurement"

  - name: "KWS Meter 2 Spanning"
    unique_id: "kws_meter_2_spanning"
    slave: 4
    register_type: "holding"
    address: 14
    data_type: "int16"
    scale: 0.01
    precision: 1
    unit_of_measurement: "V"
    device_class: "voltage"
    state_class: "measurement"

  - name: "KWS Meter 3 Spanning"
    unique_id: "kws_meter_3_spanning"
    slave: 5
    register_type: "holding"
    address: 14
    data_type: "int16"
    scale: 0.01
    precision: 1
    unit_of_measurement: "V"
    device_class: "voltage"
    state_class: "measurement"

  # ====================================================================
  # 🔆 4. GROWATT INVERTERS (Slave IDs 51-55)
